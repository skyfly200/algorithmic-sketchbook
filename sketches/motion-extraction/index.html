<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motion Extraction</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
      canvas { display: block; width: 100vw; height: 100vh; }
      #chooser {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 14px;
        color: #ddd; font: 15px system-ui, sans-serif;
        background: rgba(0, 0, 0, 0.6);
      }
      #chooser button {
        font: inherit; color: #fff; cursor: pointer;
        padding: 10px 22px; border-radius: 999px;
        background: rgba(124, 140, 255, 0.25);
        border: 1px solid rgba(124, 140, 255, 0.7);
      }
      #chooser button:hover { background: rgba(124, 140, 255, 0.45); }
      #chooser p { max-width: 420px; text-align: center; opacity: 0.7; margin: 0 0 8px; }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="chooser">
      <p>
        Motion extraction blends the live image with an inverted, delayed copy
        of itself — stillness cancels out, movement glows.
      </p>
      <button id="use-camera">📷 Use my camera</button>
      <button id="use-demo">▶ Use demo source</button>
    </div>
    <script type="module" src="./sketch.js"></script>
  </body>
</html>
