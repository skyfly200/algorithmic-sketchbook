<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holographic Display</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
      canvas { display: block; }
      /* The load-model control lives in the viewer's options panel (an action
         param), not overlaid on the render. Drag & drop still works anywhere. */
      #ui { display: none; }
      #load {
        background: rgba(20, 30, 45, 0.8); color: #7fe6ff; cursor: pointer;
        border: 1px solid rgba(90, 200, 255, 0.5); border-radius: 8px; padding: 8px 12px;
      }
      #load:hover { background: rgba(30, 45, 65, 0.9); }
      #note { margin-top: 6px; opacity: 0.6; transition: opacity 1s; }
      #file { display: none; }
    </style>
  </head>
  <body>
    <div id="ui">
      <button id="load">Load 3D model</button>
      <div id="note">.glb · .gltf · .obj · .stl · .fbx — or drop a file anywhere</div>
    </div>
    <input id="file" type="file" accept=".glb,.gltf,.obj,.stl,.fbx" />
    <script type="module" src="./sketch.js"></script>
  </body>
</html>
